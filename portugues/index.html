<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="utilities.js"></script>
    <script src="portugues.js"></script>
    <title>Português</title>
</head>
<body>
    <div class="column center" style="padding: 2vw">
        <h1>Portugês</h1>

        <div class="row center">
            <button onclick="reload(0)">Queue cards</button>
            <button onclick="reload(1)">Useful phrases</button>
            <button onclick="reload(2)">Verbs</button>
            <button onclick="reload(3)">Dictionary</button>
        </div>

        <h2 style="margin-top: 1vw" id="sectionTitle">Queue cards</h2>

        <input id="search">

        <div class="column center" id="info">
            <div class="row center">
                <button onclick="reload()" id="reloadButton">Next</button>
                <button onclick="showAnswer()" id="answerButton">Answer</button>
            </div>

            <div class="row center" style="margin-top: 1vw">
                <div class="column center">
                    <h3 id="title">...</h3>
                    <p id="description">...</p>
                </div>

                <p>►</p>

                <div class="column center">
                    <h3 id="answerTitle">Answer</h3>
                    <p id="answer">...</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
